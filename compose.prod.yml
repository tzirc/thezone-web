services:
  thezone-website:
    image: nginx:alpine
    container_name: thezone-website
    restart: unless-stopped

    #/home/apps/containers/thezone-website/wwwroot/
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./logs:/var/log/nginx

    networks:
      - npm_default
      
    command: >
      sh -c "cp /etc/nginx/templates/nginx.conf.template /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"

    deploy:
      resources:
        limits:
          # Hard limit: Docker will kill the container if it passes this
          memory: 120M
        reservations:
          # Soft limit: What the container expects to comfortably use
          memory: 50M


networks:
  npm_default:
    external: true
