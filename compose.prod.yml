services:
  tzirc-com:
    image: nginx:alpine
    container_name: tzirc-com
    restart: unless-stopped

    volumes:
      - /home/apps/containers/tzirc.com/html:/usr/share/nginx/html:ro
      - /home/apps/containers/tzirc.com/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - /home/apps/containers/tzirc.com/logs:/var/log/nginx

    networks:
      - npm_default
      
    command: >
      sh -c "cp /etc/nginx/templates/nginx.conf.template /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"

    deploy:
      resources:
        limits:
          # Hard limit: Docker will kill the container if it passes this
          memory: 150M
        reservations:
          # Soft limit: What the container expects to comfortably use
          memory: 50M


networks:
  npm_default:
    external: true
