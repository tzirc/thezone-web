<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 160 160"
     role="img"
     aria-labelledby="title desc">
	<title id="title">#TheZone orbital network logo</title>
	<desc id="desc">A clean orbital network mark with a sharp central zone shard for TheZone IRC Network.</desc>
	<defs>
		<radialGradient id="zone3-core" cx="50%" cy="46%" r="58%">
			<stop offset="0" stop-color="#1c242b" />
			<stop offset="0.68" stop-color="#07090b" />
			<stop offset="1" stop-color="#030405" />
		</radialGradient>
		<linearGradient id="zone3-orange" x1="24" y1="30" x2="138" y2="132" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#ffe0a1" />
			<stop offset="0.45" stop-color="#ff9f1a" />
			<stop offset="1" stop-color="#ff6b00" />
		</linearGradient>
		<linearGradient id="zone3-cyan" x1="42" y1="50" x2="112" y2="105" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#f7f4eb" />
			<stop offset="1" stop-color="#68e4ff" />
		</linearGradient>
	</defs>

	<circle cx="80" cy="80" r="67" fill="url(#zone3-core)" stroke="rgba(255,255,255,0.18)" stroke-width="2" />
	<g fill="none" stroke-linecap="round">
		<ellipse cx="80" cy="80" rx="72" ry="23" stroke="url(#zone3-orange)" stroke-width="4" transform="rotate(-24 80 80)" />
		<ellipse cx="80" cy="80" rx="72" ry="23" stroke="#ffc266" stroke-width="3" opacity="0.78" transform="rotate(68 80 80)" />
		<path d="M18 111c33-5 72-20 124-58" stroke="#68e4ff" stroke-width="3" opacity="0.75" />
	</g>

	<circle cx="36" cy="100" r="5" fill="#68e4ff" />
	<circle cx="119" cy="48" r="5" fill="#ff9f1a" />
	<circle cx="128" cy="112" r="4" fill="#ffc266" />

	<path d="M39 89l72-43 18 18-73 49z" fill="#050607" stroke="url(#zone3-orange)" stroke-width="4" stroke-linejoin="round" />
	<path d="M57 82l39-23-9 25 25-5-49 28 10-25z" fill="url(#zone3-cyan)" />
	<path d="M73 29l-16 101" fill="none" stroke="#ffc266" stroke-width="4" stroke-linecap="round" opacity="0.9" />
	<path d="M101 31l-17 101" fill="none" stroke="#ff9f1a" stroke-width="4" stroke-linecap="round" opacity="0.9" />
</svg>
