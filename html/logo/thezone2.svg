<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 160 160"
     role="img"
     aria-labelledby="title desc">
	<title id="title">#TheZone terminal orbit logo</title>
	<desc id="desc">A modern terminal-style badge with an orbital hash mark for TheZone IRC Network.</desc>
	<defs>
		<linearGradient id="zone2-panel" x1="38" y1="36" x2="122" y2="124" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#171b21" />
			<stop offset="1" stop-color="#050607" />
		</linearGradient>
		<linearGradient id="zone2-orange" x1="26" y1="26" x2="136" y2="132" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#ffd27a" />
			<stop offset="0.58" stop-color="#ff9f1a" />
			<stop offset="1" stop-color="#ff6b00" />
		</linearGradient>
		<filter id="zone2-glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="3" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>

	<circle cx="80" cy="80" r="72" fill="#050607" />
	<circle cx="80" cy="80" r="63" fill="none" stroke="url(#zone2-orange)" stroke-width="3" opacity="0.95" />
	<path d="M28 86c25-28 55-44 91-50" fill="none" stroke="#ffc266" stroke-width="5" stroke-linecap="round" opacity="0.92" />
	<path d="M34 114c32-10 65-30 97-60" fill="none" stroke="#ff9f1a" stroke-width="3" stroke-linecap="round" opacity="0.7" />

	<rect x="38" y="48" width="84" height="64" rx="11" fill="url(#zone2-panel)" stroke="#ffc266" stroke-width="3" />
	<path d="M52 68l17 12-17 12" fill="none" stroke="#68e4ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
	<path d="M77 96h31" fill="none" stroke="#f7f4eb" stroke-width="6" stroke-linecap="round" />
	<path d="M106 28l-22 104" fill="none" stroke="#ff9f1a" stroke-width="4" stroke-linecap="round" filter="url(#zone2-glow)" />
	<path d="M52 33l-17 94" fill="none" stroke="#ffc266" stroke-width="3" stroke-linecap="round" opacity="0.7" />
</svg>
