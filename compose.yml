services:
  thezone-website:
    image: nginx:alpine
    container_name: thezone-website
    restart: unless-stopped

    #/home/apps/containers/thezone-website/wwwroot/
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./logs:/var/log/nginx

    ports:
      - "5002:80"
      
    command: >
      sh -c "cp /etc/nginx/templates/nginx.conf.template /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"


  thezone-thelounge:
    image: ghcr.io/thelounge/thelounge:latest
    container_name: tzirc-lounge
    restart: unless-stopped
    ports:
      - "5003:9000"
    volumes:
      - ./thelounge:/var/opt/thelounge